<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Before Loading Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=JetBrains+Mono:wght@400;600&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="ecommerce-concept.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true"></div>

    <header class="hero">
      <h1>Before Loading: Product Listing</h1>
      <p>This is the pre-data state (skeleton UI).</p>
      <div class="hero-links">
        <a class="back-link" href="/ecommerce-concept.html">← Concept Home</a>
        <a class="chip-link" href="/ecommerce-concept.html">Concept</a>
        <a class="chip-link active" href="/ecommerce-before-loading.html"
          >Before</a
        >
        <a class="chip-link" href="/ecommerce-after-loading.html">After</a>
      </div>
    </header>

    <main class="page-content">
      <div class="status status-loading">Loading products from API...</div>

      <section class="product-grid">
        <article class="product-card skeleton">
          <div class="skeleton-box skeleton-media"></div>
          <div class="skeleton-box skeleton-title"></div>
          <div class="skeleton-box skeleton-line"></div>
          <div class="skeleton-box skeleton-line short"></div>
          <div class="skeleton-box skeleton-price"></div>
          <div class="skeleton-box skeleton-button"></div>
        </article>

        <article class="product-card skeleton">
          <div class="skeleton-box skeleton-media"></div>
          <div class="skeleton-box skeleton-title"></div>
          <div class="skeleton-box skeleton-line"></div>
          <div class="skeleton-box skeleton-line short"></div>
          <div class="skeleton-box skeleton-price"></div>
          <div class="skeleton-box skeleton-button"></div>
        </article>

        <article class="product-card skeleton">
          <div class="skeleton-box skeleton-media"></div>
          <div class="skeleton-box skeleton-title"></div>
          <div class="skeleton-box skeleton-line"></div>
          <div class="skeleton-box skeleton-line short"></div>
          <div class="skeleton-box skeleton-price"></div>
          <div class="skeleton-box skeleton-button"></div>
        </article>
      </section>
    </main>
  </body>
</html>
